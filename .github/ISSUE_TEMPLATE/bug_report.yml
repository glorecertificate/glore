name: Bug report
description: Report a bug or unexpected behavior
title: 'fix: '
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to file a bug. Please fill out the fields below so we can reproduce and fix it quickly.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps that trigger the bug.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened. Include screenshots or recordings if relevant.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the platform is affected?
      options:
        - Authentication / onboarding
        - Courses
        - Certificates
        - Admin
        - Organizations
        - Emails
        - Internationalization
        - Other / not sure
    validations:
      required: false
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Browser, OS, and (if relevant) Node.js version.
      placeholder: e.g. Chrome 140 on macOS 15, Node 24
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Logs, related issues, or anything else that helps diagnose the problem.
    validations:
      required: false
