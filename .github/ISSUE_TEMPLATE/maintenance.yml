name: Maintenance
description: Dependency updates, refactoring, or technical debt
title: 'chore: '
labels:
  - maintenance
body:
  - type: markdown
    attributes:
      value: Use this for upkeep work that is not a user-facing bug or feature.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Brief description of the maintenance task.
    validations:
      required: true
  - type: textarea
    id: changes
    attributes:
      label: Changes needed
      description: List the concrete steps or items to address.
      placeholder: |
        - [ ] First change
        - [ ] Second change
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why this is necessary (outdated dependency, tech debt, performance, etc.).
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Migration notes, breaking changes, or risks to be aware of.
    validations:
      required: false
