name: Check

on: workflow_call

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - uses: ./.github/actions/setup
        with:
          strict-peer-dependencies: true
      - uses: actions/cache@v5
        with:
          path: .next/.tsbuildinfo
          key: tsc-${{ runner.os }}-${{ hashFiles('tsconfig.json', 'src/**/*.ts', 'src/**/*.tsx') }}
          restore-keys: tsc-${{ runner.os }}-
      - name: Run code checks
        run: pnpm run check
