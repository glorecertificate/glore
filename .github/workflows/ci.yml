name: CI

on:
  push:
    branches:
      - main

env:
  VERCEL_TELEMETRY_DISABLED: 1

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    if: "!startsWith(github.event.head_commit.message, 'chore(release):')"
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --strict-peer-dependencies
      - name: Run code checks
        run: pnpm run check:ci

  deploy:
    name: Deploy Preview
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read
      deployments: write
    environment:
      name: Preview
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --dev --frozen-lockfile --strict-peer-dependencies --ignore-scripts
      - name: Deploy to Vercel
        run: pnpm exec vercel deploy --token=${{ secrets.VERCEL_TOKEN }} --no-wait --yes
