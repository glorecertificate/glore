name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  VERCEL_TELEMETRY_DISABLED: 1

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    if: "!startsWith(github.event.head_commit.message, 'chore(release):')"
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --strict-peer-dependencies
      - name: Run code checks
        run: pnpm run check:ci

  deploy:
    name: Deploy Preview
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read
      deployments: write
    environment:
      name: Preview
      url: ${{ steps.vercel.outputs.deployment-url }}
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --dev --frozen-lockfile --strict-peer-dependencies --ignore-scripts
      - name: Pull Vercel environment
        run: pnpm exec vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
      - name: Build project
        run: pnpm exec vercel build --token=${{ secrets.VERCEL_TOKEN }}
      - name: Check bundle size
        run: pnpm run check:size
      - name: Deploy to Vercel
        id: vercel
        run: |
          pnpm exec vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }} > deployment-url.txt
          echo "deployment-url=$(cat deployment-url.txt)" >> $GITHUB_OUTPUT
