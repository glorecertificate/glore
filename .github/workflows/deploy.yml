name: Deploy

on:
  workflow_call:
    inputs:
      environment:
        description: Environment to deploy to, can be preview or production.
        default: preview
        type: string
    secrets:
      VERCEL_TOKEN:
        required: true

concurrency:
  group: deploy-${{ inputs.environment }}
  cancel-in-progress: false

env:
  NEXT_TELEMETRY_DISABLED: 1
  VERCEL_TELEMETRY_DISABLED: 1
  VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    name: Deploy ${{ inputs.environment }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      deployments: write
    environment:
      name: ${{ inputs.environment }}
      url: ${{ steps.vercel.outputs.url }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - uses: ./.github/actions/setup
        with:
          dev-only: true
          ignore-scripts: true
      - uses: actions/cache@v5
        with:
          path: .next/cache
          key: nextjs-${{ runner.os }}-${{ inputs.environment }}-${{ github.sha }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ inputs.environment }}-
            nextjs-${{ runner.os }}-
      - name: Pull environment
        run: pnpm exec vercel pull --yes --environment=${{ inputs.environment }} --token=${{ secrets.VERCEL_TOKEN }}
      - name: Build project artifacts
        run: |
          set -a
          . .vercel/.env.${{ inputs.environment }}.local
          set +a
          pnpm exec vercel build --target=${{ inputs.environment }} --token=${{ secrets.VERCEL_TOKEN }}
      - name: Deploy to Vercel
        id: vercel
        run: echo "url=$(pnpm exec vercel deploy --prebuilt --archive=tgz --target=${{ inputs.environment }} --token=${{ secrets.VERCEL_TOKEN }})" >> "$GITHUB_OUTPUT"
